name: Deploy to FTP

on:
  push:
    branches:
      - main # Akan berjalan otomatis setiap ada push ke branch main

jobs:
  web-deploy:
    name: Deploy to Hosting
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2' # Sesuaikan dengan versi PHP kamu

    - name: Install Composer Dependencies
      run: composer install --no-dev --optimize-autoloader
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install NPM Dependencies & Build
      run: |
        npm install
        npm run build

    - name: Sync files via LFTP (Fast SFTP)
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        sudo apt-get update && sudo apt-get install -y lftp sshpass
        lftp -c "
        set sftp:auto-confirm yes;
        set ftp:ssl-allow no;
        open sftp://$FTP_USERNAME:$FTP_PASSWORD@$FTP_SERVER:2222;
        mirror -R -v --parallel=10 --only-newer \
          --exclude-glob .git/ \
          --exclude-glob .github/ \
          --exclude-glob node_modules/ \
          --exclude-glob tests/ \
          --exclude-glob storage/ \
          --exclude .env.example \
          --exclude .gitignore \
          ./ /
        "

    - name: Run Database Migrations
      run: curl -s "https://simkatmawa.uniska-bjm.ac.id/run-migration?token=${{ secrets.MIGRATION_TOKEN }}"
