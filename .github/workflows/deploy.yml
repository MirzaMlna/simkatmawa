name: Deploy to FTP

on:
  push:
    branches:
      - main # Akan berjalan otomatis setiap ada push ke branch main

jobs:
  web-deploy:
    name: Deploy to Hosting
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2' # Sesuaikan dengan versi PHP kamu

    - name: Install Composer Dependencies
      run: composer install --no-dev --optimize-autoloader
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install NPM Dependencies & Build
      run: |
        npm install
        npm run build

    - name: Prepare Release ZIP
      run: |
        zip -q -r release.zip . -x "*.git*" "*node_modules*" "*tests*" "storage/*" ".env*"

    - name: Generate Unzip Script
      run: |
        cat << 'EOF' > public/unzip-deploy.php
        <?php
        if (($_GET['token'] ?? '') !== '${{ secrets.MIGRATION_TOKEN }}') die('Unauthorized');
        $zipFile = __DIR__ . '/../release.zip';
        if (!file_exists($zipFile)) $zipFile = __DIR__ . '/release.zip';
        if (file_exists($zipFile)) {
            $zip = new ZipArchive;
            if ($zip->open($zipFile) === TRUE) {
                $zip->extractTo(dirname($zipFile));
                $zip->close();
                unlink($zipFile);
                echo "Unzip OK";
            } else die("Unzip Failed");
        } else echo "No ZIP";
        unlink(__FILE__);
        EOF

    - name: Upload ZIP via LFTP
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        sudo apt-get update && sudo apt-get install -y lftp sshpass
        lftp -c "
        set sftp:auto-confirm yes;
        set ftp:ssl-allow no;
        open sftp://$FTP_USERNAME:$FTP_PASSWORD@$FTP_SERVER:2222;
        put release.zip -o release.zip;
        put public/unzip-deploy.php -o public/unzip-deploy.php;
        "

    - name: Extract ZIP on Server
      run: curl -s "https://simkatmawa.uniska-bjm.ac.id/unzip-deploy.php?token=${{ secrets.MIGRATION_TOKEN }}"

    - name: Run Database Migrations
      run: curl -s "https://simkatmawa.uniska-bjm.ac.id/run-migration?token=${{ secrets.MIGRATION_TOKEN }}"
