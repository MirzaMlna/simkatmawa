name: Deploy to FTP

on:
  push:
    branches:
      - main # Akan berjalan otomatis setiap ada push ke branch main

jobs:
  web-deploy:
    name: Deploy to Hosting
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2' # Sesuaikan dengan versi PHP kamu

    - name: Install Composer Dependencies
      run: composer install --no-dev --optimize-autoloader
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install NPM Dependencies & Build
      run: |
        npm install
        npm run build

    - name: Prepare Release ZIP
      run: |
        zip -q -r release.zip . -x "*.git*" "*node_modules*" "*tests*" "storage/*" ".env*"
        mkdir deploy-dist
        mv release.zip deploy-dist/
        mkdir deploy-dist/public
        cat << 'EOF' > deploy-dist/public/unzip-deploy.php
        <?php
        if (($_GET['token'] ?? '') !== '${{ secrets.MIGRATION_TOKEN }}') die('Unauthorized');
        $zipFile = __DIR__ . '/../release.zip';
        if (!file_exists($zipFile)) $zipFile = __DIR__ . '/release.zip';
        if (file_exists($zipFile)) {
            $zip = new ZipArchive;
            if ($zip->open($zipFile) === TRUE) {
                $zip->extractTo(dirname($zipFile));
                $zip->close();
                unlink($zipFile);
                echo "Unzip OK";
            } else die("Unzip Failed");
        } else echo "No ZIP";
        unlink(__FILE__);
        EOF

    - name: Upload ZIP via SFTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 2222
        protocol: sftp
        local-dir: ./deploy-dist/
        server-dir: ./

    - name: Extract ZIP on Server
      run: curl -s "https://simkatmawa.uniska-bjm.ac.id/unzip-deploy.php?token=${{ secrets.MIGRATION_TOKEN }}"

    - name: Run Database Migrations
      run: curl -s "https://simkatmawa.uniska-bjm.ac.id/run-migration?token=${{ secrets.MIGRATION_TOKEN }}"
